name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  json-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          for f in .claude-plugin/plugin.json; do
            if [ -f "$f" ]; then
              echo "Validating $f"
              python3 -m json.tool "$f" > /dev/null
            fi
          done

  no-hardcoded-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded user paths
        run: |
          if grep -r '/Users/' --include='*.md' --include='*.sh' --include='*.json' \
            --exclude-dir=.git --exclude='CONTRIBUTING.md' .; then
            echo "Found hardcoded /Users/ paths"
            exit 1
          fi
          echo "No hardcoded paths found"
